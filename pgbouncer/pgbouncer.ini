[databases]
; Cada base de datos del stack apunta al postgres interno
; Sintaxis: nombre_db = host=... port=... dbname=...
mlflow      = host=postgres port=5432 dbname=mlflow
prefect     = host=postgres port=5432 dbname=prefect
jupyterhub  = host=postgres port=5432 dbname=jupyterhub
saacdata    = host=postgres port=5432 dbname=saacdata
; Comodín: cualquier otra DB pasa directamente
*           = host=postgres port=5432

[pgbouncer]
; Puerto donde escucha PgBouncer
listen_port = 5432
listen_addr = 0.0.0.0

; Archivo de credenciales
auth_file = /etc/pgbouncer/userlist.txt
auth_type = scram-sha-256

; ── Pool settings ───────────────────────────────────────────────────────────
; transaction: mejor rendimiento para ORMs y apps web
; NOTA: prefect usa prepared_statement_cache_size=0 para compatibilidad
pool_mode = transaction

; Conexiones reales a Postgres por (usuario, base de datos)
default_pool_size = 25

; Máximo de conexiones lógicas de clientes que acepta PgBouncer
max_client_conn = 200

; Conexiones en reserva para admin
reserve_pool_size = 5
reserve_pool_timeout = 3

; ── Timeouts ────────────────────────────────────────────────────────────────
server_idle_timeout = 600
client_idle_timeout = 0
server_connect_timeout = 15
server_login_retry = 15

; ── Parámetros ignorados al conectar (evita errores con algunos clientes) ───
ignore_startup_parameters = extra_float_digits,search_path,options

; ── Logging ─────────────────────────────────────────────────────────────────
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; ── Admin ───────────────────────────────────────────────────────────────────
; Acceso a la consola de administración de PgBouncer
admin_users = postgres
stats_users = postgres