services:
 
  # ─── POSTGRES ──────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ds_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER no definido}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD no definido}
      TZ: America/Guayaquil
      PGTZ: America/Guayaquil
    volumes:
      - /data/datascience/postgres:/var/lib/postgresql/data
      - ./sql/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5433:5432"
    networks:
      - ds_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  # ─── PGBOUNCER ─────────────────────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ds_pgbouncer
    restart: unless-stopped
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:?POSTGRES_USER no definido}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD no definido}
      - LISTEN_PORT=5432
      - LISTEN_ADDR=0.0.0.0
      - DEFAULT_POOL_SIZE=25
      - MAX_CLIENT_CONN=200
      - POOL_MODE=transaction
      - SERVER_RESET_QUERY=DISCARD ALL
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits,search_path,options,statement_timeout,prepared_statement_cache_size
      - AUTH_TYPE=scram-sha-256
    ports:
      - "5432:5432"
    networks:
      - ds_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  # ─── MINIO ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ds_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER no definido}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD no definido}
    volumes:
      - /data/datascience/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ds_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
 
  minio-setup:
    image: minio/mc:latest
    container_name: ds_minio_setup
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing myminio/raw-data;
      mc mb --ignore-existing myminio/processed-data;
      mc mb --ignore-existing myminio/models;
      mc mb --ignore-existing myminio/artifacts;
      echo 'Buckets creados correctamente';
      "
    networks:
      - ds_network
 
  # ─── MLFLOW ────────────────────────────────────────────────────────────────
  # MLflow no tiene curl ni wget — el healthcheck usa solo TCP para no
  # interferir con los workers de gunicorn
  mlflow:
    build: ./mlflow
    container_name: ds_mlflow
    restart: unless-stopped
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_BACKEND_STORE_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/mlflow
      --default-artifact-root s3://artifacts/
      --serve-artifacts
    ports:
      - "5000:5000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ds_network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',5000)); s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
 
  # ─── PREFECT ───────────────────────────────────────────────────────────────
  prefect:
    image: prefecthq/prefect:3-latest
    container_name: ds_prefect
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER:?POSTGRES_USER no definido}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD no definido}@pgbouncer:5432/prefect?prepared_statement_cache_size=0
      PREFECT_UI_API_URL: http://${SERVER_IP:-localhost}:4200/api
    volumes:
      - /data/datascience/prefect:/root/.prefect
      - ./flows:/flows
    ports:
      - "4200:4200"
    depends_on:
      pgbouncer:
        condition: service_healthy
    networks:
      - ds_network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',4200)); s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
 
  # ─── JUPYTERHUB ────────────────────────────────────────────────────────────
  jupyterhub:
    build: ./jupyterhub
    container_name: ds_jupyterhub
    restart: unless-stopped
    volumes:
      - /data/datascience/jupyterhub:/srv/jupyterhub
      - /data/datascience/notebooks:/home
      - ./notebooks:/srv/notebooks/examples
      - ./flows:/srv/flows
    ports:
      - "8000:8000"
    environment:
      JUPYTERHUB_ADMIN: ${JUPYTERHUB_ADMIN:-admin}
      JUPYTERHUB_DB_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/jupyterhub
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PREFECT_API_URL: http://prefect:4200/api
      GIT_PYTHON_REFRESH: quiet
    depends_on:
      pgbouncer:
        condition: service_healthy
      mlflow:
        condition: service_started   # started, no healthy — mlflow ya corre aunque tarde en responder HTTP
    networks:
      - ds_network
 
  # ─── STREAMLIT ─────────────────────────────────────────────────────────────
  streamlit:
    build: ./dashboards
    container_name: ds_streamlit
    restart: unless-stopped
    volumes:
      - ./dashboards:/app
      - /data/datascience/minio:/data/local
    ports:
      - "8501:8501"
    environment:
      - SERVER_IP=${SERVER_IP}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      minio:
        condition: service_healthy
      mlflow:
        condition: service_started   # started, no healthy
    networks:
      - ds_network
 
networks:
  ds_network:
    driver: bridge
 
volumes: {}  # Todos los volúmenes son bind mounts al SSD