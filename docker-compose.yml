# Config compartida por los 3 workers de Prefect (ver más abajo, sección
# PREFECT WORKERS): mismo build/imagen, mismas credenciales, mismos mounts
# de flows. Lo único que cambia entre uno y otro es el pool al que hacen
# polling y su límite de concurrencia -- ver PREFECT_JUPYTER_GUIDE.md, paso 5.
x-prefect-worker-common: &prefect-worker-common
  build: ./prefect-worker
  restart: unless-stopped
  # Trae automáticamente TODO lo del .env (cualquier var nueva, sin tener
  # que editar este archivo); los mapeos de abajo (`environment:`) siguen
  # existiendo para renombrar lo que los flows esperan con otro nombre
  # (ej. MINIO_ACCESS_KEY <- MINIO_ROOT_USER) y tienen prioridad sobre esto.
  env_file: .env
  environment:
    PREFECT_API_URL: http://prefect:4200/api
    POSTGRES_HOST: pgbouncer
    POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER no definido}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD no definido}
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
    MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    MLFLOW_TRACKING_URI: http://mlflow:5000
    MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    OPENAI_API_KEY_TH: ${OPENAI_API_KEY_TH:-}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    TZ: America/Guayaquil
    # Permite `from common_tasks import ...` desde cualquier flow (org/shared/users)
    PYTHONPATH: /flows/org:/flows/shared
  volumes:
    - ./flows:/flows/org                          # Flows organizacionales (repo git)
    - /data/datascience/flows:/flows/shared       # Flows compartidos entre usuarios
    - /data/datascience/notebooks:/flows/users    # Flows de usuarios en sus carpetas
  depends_on:
    prefect:
      condition: service_healthy
    mlflow:
      condition: service_started   # started, no healthy — mlflow ya corre aunque tarde en responder HTTP
  networks:
    - ds_network

services:

  # ─── POSTGRES ──────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ds_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER no definido}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD no definido}
      TZ: America/Guayaquil
      PGTZ: America/Guayaquil
    volumes:
      - /data/datascience/postgres:/var/lib/postgresql/data
      - ./sql/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5433:5432"
    networks:
      - ds_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  # ─── PGBOUNCER ─────────────────────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ds_pgbouncer
    restart: unless-stopped
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:?POSTGRES_USER no definido}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD no definido}
      - LISTEN_PORT=5432
      - LISTEN_ADDR=0.0.0.0
      - DEFAULT_POOL_SIZE=25
      - MAX_CLIENT_CONN=200
      - POOL_MODE=transaction
      - SERVER_RESET_QUERY=DISCARD ALL
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits,search_path,options,statement_timeout,prepared_statement_cache_size
      - AUTH_TYPE=scram-sha-256
    ports:
      - "5432:5432"
    networks:
      - ds_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  # ─── MINIO ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ds_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER no definido}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD no definido}
    volumes:
      - /data/datascience/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ds_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
 
  minio-setup:
    image: minio/mc:latest
    container_name: ds_minio_setup
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing myminio/raw-data;
      mc mb --ignore-existing myminio/processed-data;
      mc mb --ignore-existing myminio/models;
      mc mb --ignore-existing myminio/artifacts;
      echo 'Buckets creados correctamente';
      "
    networks:
      - ds_network
 
  # ─── MLFLOW ────────────────────────────────────────────────────────────────
  # MLflow no tiene curl ni wget — el healthcheck usa solo TCP para no
  # interferir con los workers de gunicorn
  mlflow:
    build: ./mlflow
    container_name: ds_mlflow
    restart: unless-stopped
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_BACKEND_STORE_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/mlflow
      --default-artifact-root s3://artifacts/
      --serve-artifacts
    ports:
      - "5000:5000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ds_network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',5000)); s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
 
  # ─── PREFECT ───────────────────────────────────────────────────────────────
  prefect:
    image: prefecthq/prefect:3-latest
    container_name: ds_prefect
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER:?POSTGRES_USER no definido}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD no definido}@pgbouncer:5432/prefect?prepared_statement_cache_size=0
      PREFECT_UI_API_URL: http://${SERVER_IP:-localhost}:4200/api
      TZ: America/Guayaquil
    volumes:
      - /data/datascience/prefect:/root/.prefect
      - ./flows:/flows/org                          # Flows organizacionales (repo git)
      - /data/datascience/flows:/flows/shared       # Flows compartidos entre usuarios
      - /data/datascience/notebooks:/flows/users    # Flows de usuarios en sus carpetas
    ports:
      - "4200:4200"
    depends_on:
      pgbouncer:
        condition: service_healthy
    networks:
      - ds_network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',4200)); s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  # ─── PREFECT WORKERS ───────────────────────────────────────────────────────
  # El servicio `prefect` de arriba es solo el server (API + UI + DB); no
  # ejecuta flows. Cada worker de abajo hace polling a UN pool y corre el
  # código real de los flows deployados ahí (org/shared/users). Un pool
  # nuevo sin worker propio = runs que se quedan en "Scheduled" para siempre.
  #
  # Agrupados por TIPO de carga (no por unidad/proyecto individual) porque
  # el límite de concurrencia es sobre todo un control de recursos del
  # servidor, y proyectos del mismo tipo comparten perfil de recursos aunque
  # sean de unidades distintas. Filtra por unidad con --tag al deployar
  # (ej. --tag th, --tag academico), no con un pool nuevo por unidad.
  #
  # Si cambias el --concurrency-limit de un pool que ya existe, el
  # `work-pool create ... || true` de abajo NO lo actualiza (create no-opea
  # si ya existe) -- usa `prefect work-pool update <pool> --concurrency-limit N`.

  # Chats de n8n por unidad (TH, académico, bienestar, ...): lectura DB +
  # modelo de sentimiento + OpenAI. Bound más por rate limit/costo de OpenAI
  # que por CPU local -- algo de paralelismo entre unidades está bien.
  prefect-worker-chats:
    <<: *prefect-worker-common
    container_name: ds_prefect_worker_chats
    command: >
      /bin/sh -c "
      prefect work-pool create chats --type process --concurrency-limit 3 || true;
      prefect worker start --pool chats --type process
      "

  # Entrenamiento de modelos (riesgo académico, planificación académica,
  # ODS, carreras, ...): lo más pesado en CPU/RAM. Concurrency-limit 1 a
  # propósito -- correr dos entrenamientos a la vez en el mismo servidor es
  # el escenario que puede tumbarlo por memoria.
  prefect-worker-training:
    <<: *prefect-worker-common
    container_name: ds_prefect_worker_training
    command: >
      /bin/sh -c "
      prefect work-pool create training --type process --concurrency-limit 1 || true;
      prefect worker start --pool training --type process
      "

  # Procesamiento de datos para dashboards: jobs más livianos tipo ETL, pero
  # van a ser varios proyectos. Límite más alto para dar throughput sin
  # dejar que se amontonen todos a la vez sin control.
  prefect-worker-dashboards:
    <<: *prefect-worker-common
    container_name: ds_prefect_worker_dashboards
    command: >
      /bin/sh -c "
      prefect work-pool create dashboards --type process --concurrency-limit 20 || true;
      prefect worker start --pool dashboards --type process
      "

  # Comodín para lo que todavía no encaja claramente en chats/training/
  # dashboards (pruebas puntuales, un flow nuevo mientras se decide su tipo
  # real, etc.). Concurrency-limit bajo a propósito porque es "cajón de
  # sastre" -- no se conoce de antemano el perfil de recursos de lo que
  # caiga aquí. Si algo que vive en `default` se vuelve recurrente, muévelo
  # a su pool por tipo (ver PREFECT_JUPYTER_GUIDE.md, paso 5).
  prefect-worker-default:
    <<: *prefect-worker-common
    container_name: ds_prefect_worker_default
    command: >
      /bin/sh -c "
      prefect work-pool create default --type process --concurrency-limit 2 || true;
      prefect worker start --pool default --type process
      "

  # ─── JUPYTERHUB ────────────────────────────────────────────────────────────
  jupyterhub:
    build: ./jupyterhub
    container_name: ds_jupyterhub
    restart: unless-stopped
    # Trae automáticamente TODO lo del .env a este contenedor. El segundo
    # salto (Hub -> proceso del notebook de cada usuario) lo hace
    # c.Spawner.environment en jupyterhub_config.py, reenviando por prefijo
    # conocido lo que esté aquí -- ver el comentario ahí para el porqué.
    env_file: .env
    volumes:
      - /data/datascience/jupyterhub:/srv/jupyterhub
      - /data/datascience/notebooks:/home
      - ./notebooks:/srv/notebooks/examples
      - ./flows:/srv/flows/org
      - /data/datascience/flows:/srv/flows/shared    # Flows compartidos accesibles
      # Mismas rutas absolutas que ven los prefect-worker-* (/flows/org,
      # /flows/shared, /flows/users) -- mismos archivos que /srv/flows/org,
      # /srv/flows/shared y /home de arriba, montados también aquí para que
      # `prefect deploy` con storage local resuelva igual en JupyterHub y en
      # el worker que después ejecuta el flow. Usa estas rutas (no /home ni
      # /srv/flows/...) cuando vayas a deployar -- ver PREFECT_JUPYTER_GUIDE.md.
      - ./flows:/flows/org
      - /data/datascience/flows:/flows/shared
      - /data/datascience/notebooks:/flows/users
    ports:
      - "8000:8000"
    environment:
      JUPYTERHUB_ADMIN: ${JUPYTERHUB_ADMIN:-admin}
      JUPYTERHUB_DB_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/jupyterhub
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PREFECT_API_URL: http://prefect:4200/api
      GIT_PYTHON_REFRESH: quiet
      OPENAI_API_KEY_TH: ${OPENAI_API_KEY_TH:-}
      TZ: America/Guayaquil
    depends_on:
      pgbouncer:
        condition: service_healthy
      mlflow:
        condition: service_started   # started, no healthy — mlflow ya corre aunque tarde en responder HTTP
    networks:
      - ds_network
 
  # ─── TRAEFIK (reverse proxy de dashboards) ─────────────────────────────────
  # Enruta cada proyecto de dashboards/<proyecto> por su propio PathPrefix
  # (ej. http://SERVER_IP/proyecto-demo-1). Descubre servicios automáticamente
  # via labels de Docker: agregar un proyecto nuevo no toca esta config, solo
  # agrega un servicio nuevo con sus propios labels (ver STREAMLIT_GUIDE.md).
  traefik:
    image: traefik:v3.1
    container_name: ds_traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    environment:
      - DOCKER_API_VERSION=1.54
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ds_network

  # ─── DASHBOARD INTERNO ──────────────────────────────────────────────────────
  # Vista operativa del stack (no es para clientes, sin login). Sigue publicado
  # directo en :8501 como antes, no pasa por Traefik.
  dashboard-internal:
    build: ./dashboards/_internal
    container_name: ds_dashboard_internal
    restart: unless-stopped
    volumes:
      - ./dashboards/_internal:/app
      - /data/datascience/minio:/data/local
    ports:
      - "8501:8501"
    environment:
      - SERVER_IP=${SERVER_IP}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      minio:
        condition: service_healthy
      mlflow:
        condition: service_started   # started, no healthy
    networks:
      - ds_network

  # ─── DASHBOARDS DE PROYECTO (uno por cliente) ──────────────────────────────
  # Cada uno vive en su propio contenedor, sin puerto publicado (solo Traefik
  # lo alcanza dentro de ds_network), con su propio login y config.yaml.
  # Patrón para agregar uno nuevo: ver STREAMLIT_GUIDE.md.
  dashboard-proyecto-demo-1:
    build: ./dashboards/proyecto-demo-1
    container_name: ds_dashboard_proyecto_demo_1
    restart: unless-stopped
    command: >
      streamlit run app.py
      --server.address=0.0.0.0
      --server.port=8501
      --server.baseUrlPath=/proyecto-demo-1
    volumes:
      - ./dashboards/proyecto-demo-1:/app
      - ./dashboards/common:/app/common:ro
      - /data/datascience/minio:/data/local
    environment:
      - SERVER_IP=${SERVER_IP}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      minio:
        condition: service_healthy
      mlflow:
        condition: service_started   # started, no healthy
    networks:
      - ds_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.proyecto-demo-1.rule=PathPrefix(`/proyecto-demo-1`)"
      - "traefik.http.services.proyecto-demo-1.loadbalancer.server.port=8501"

  dashboard-proyecto-demo-2:
    build: ./dashboards/proyecto-demo-2
    container_name: ds_dashboard_proyecto_demo_2
    restart: unless-stopped
    command: >
      streamlit run app.py
      --server.address=0.0.0.0
      --server.port=8501
      --server.baseUrlPath=/proyecto-demo-2
    volumes:
      - ./dashboards/proyecto-demo-2:/app
      - ./dashboards/common:/app/common:ro
      - /data/datascience/minio:/data/local
    environment:
      - SERVER_IP=${SERVER_IP}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      minio:
        condition: service_healthy
      mlflow:
        condition: service_started   # started, no healthy
    networks:
      - ds_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.proyecto-demo-2.rule=PathPrefix(`/proyecto-demo-2`)"
      - "traefik.http.services.proyecto-demo-2.loadbalancer.server.port=8501"

networks:
  ds_network:
    driver: bridge
 
volumes: {}  # Todos los volúmenes son bind mounts al SSD