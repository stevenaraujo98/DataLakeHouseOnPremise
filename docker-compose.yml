services:
  postgres:
    image: postgres:15
    container_name: ds_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER no definido}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD no definido}
    volumes:
      - /data/datascience/postgres:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - ds_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ds_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER no definido}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD no definido}
    volumes:
      - /data/datascience/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ds_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  mlflow:
    build: ./mlflow
    container_name: ds_mlflow
    restart: unless-stopped
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER no definido}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD no definido}
    volumes:
      - /data/datascience/mlflow:/mlflow
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ds_network

  prefect:
    image: prefecthq/prefect:2-latest
    container_name: ds_prefect
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_SERVER_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER:?POSTGRES_USER no definido}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD no definido}@postgres:5432/prefect
      PREFECT_UI_API_URL: http://${SERVER_IP:-localhost}:4200/api
    volumes:
      - /data/datascience/prefect:/root/.prefect
      - ./flows:/flows
    ports:
      - "4200:4200"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ds_network

  jupyterhub:
    build: ./jupyterhub
    container_name: ds_jupyterhub
    restart: unless-stopped
    volumes:
      - /data/datascience/jupyterhub:/srv/jupyterhub
      - /data/datascience/notebooks:/home  # notebooks de usuarios
      - ./notebooks:/srv/notebooks/examples
      - ./flows:/srv/flows
    ports:
      - "8000:8000"
    environment:
      JUPYTERHUB_ADMIN: ${JUPYTERHUB_ADMIN:-admin}
    depends_on:
      - postgres
    networks:
      - ds_network

  streamlit:
    image: python:3.11-slim
    container_name: ds_streamlit
    restart: unless-stopped
    working_dir: /app
    command: >
      bash -c "pip install streamlit polars duckdb plotly boto3 mlflow --quiet &&
               streamlit run app.py --server.address=0.0.0.0 --server.port=8501"
    volumes:
      - ./dashboards:/app  # código del dashboard
      - /data/datascience/minio:/data/local  # acceso local a datos
    ports:
      - "8501:8501"
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER no definido}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD no definido}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - minio
      - mlflow
    networks:
      - ds_network

  minio-setup:
    image: minio/mc:latest
    container_name: ds_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing myminio/raw-data;
      mc mb --ignore-existing myminio/processed-data;
      mc mb --ignore-existing myminio/models;
      mc mb --ignore-existing myminio/artifacts;
      echo 'Buckets creados correctamente';
      "
    networks:
      - ds_network

networks:
  ds_network:
    driver: bridge

volumes: {}  # Todos los volúmenes son bind mounts al SSD